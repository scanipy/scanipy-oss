# pre-commit hooks for scanipy (OSS edition).
# Lint/format/type settings live in pyproject.toml -- not duplicated here.
# Run locally with: pre-commit run --all-files
#
# `pre-commit install` arms BOTH the commit-time and push-time guards
# (default_install_hook_types below) — this is how `main` is protected locally:
#   - no-commit-to-branch : refuses commits made directly on main
#   - no-push-to-main     : refuses `git push` whose target is main
default_install_hook_types: [pre-commit, pre-push]

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
      - id: no-commit-to-branch
        args: [--branch, main]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.13
    hooks:
      - id: ruff
        name: ruff check --fix
        args: [--fix]
      - id: ruff-format
        name: ruff format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.16.0
    hooks:
      - id: mypy
        files: ^src/
        additional_dependencies:
          - types-PyYAML

  - repo: local
    hooks:
      - id: no-push-to-main
        name: Refuse direct pushes to main
        entry: scripts/no-push-to-main.sh
        language: script
        stages: [pre-push]
        always_run: true
        pass_filenames: false
        verbose: true
