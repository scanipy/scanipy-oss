# Release workflow for scanipy-oss.
#
# This builds the sdist + wheel and publishes them to PyPI when a "v*" tag is pushed.
#
# Prerequisites (one-time setup, not handled by this workflow):
#   - The "scanipy-oss" project on PyPI must have Trusted Publishing configured to
#     accept this GitHub repo, this workflow file (release.yml), and the "pypi"
#     environment used by the publish job below. No API token is used or stored.
#     See: https://docs.pypi.org/trusted-publishers/
#   - A GitHub Release should be created from the pushed tag (e.g. v0.1.0) so the
#     release notes and artifacts live alongside the published version.

name: release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build
        run: python -m pip install build

      - name: Build sdist and wheel
        run: python -m build

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
    permissions:
      id-token: write  # required for PyPI Trusted Publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
