name: Feature request
description: Suggest an idea or improvement for scanipy.
title: "feat: <short description>"
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the idea! scanipy aims to stay lean, local, and honest about
        scope — it's single-language (Python) and intraprocedural-leaning taint
        tracking. Proposals that fit that scope are easiest to land.

        If you'd like to propose a **new detector** specifically, please use the
        "Detector request" template instead.
  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: >
        What problem are you trying to solve? Is your request related to a
        frustration or a gap you've hit? ("I'm always frustrated when...")
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: A clear and concise description of what you want to happen.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any alternative solutions or workarounds you've considered.
    validations:
      required: false
  - type: textarea
    id: additional-context
    attributes:
      label: Additional context
      description: Add any other context, mockups, or links about the request here.
    validations:
      required: false
