# scanipy detector spec — taint DSL (DRAFT / v0). Schema: docs/dsl-reference.md
id: python.ssrf.ssrf
name: Server-side request forgery (SSRF)
cwe: CWE-918
severity: high
languages: [python]
message: >
  Untrusted input controls the URL of a server-side HTTP request, letting an
  attacker reach internal services or cloud metadata endpoints. Validate the URL
  against an allow-list of trusted hosts/schemes before requesting it.
metadata:
  owasp: "A10:2021-Server-Side Request Forgery (SSRF)"
  references:
    - https://cwe.mitre.org/data/definitions/918.html

# Where untrusted data enters.
sources:
  - { kind: call, pattern: "input" }
  - { kind: attribute, pattern: "flask.request.*" }

# A trusted-host allow-list check is the real fix; it is application-specific and
# not expressible as a pattern-matched string sanitizer, so none are listed (P5).
# See docs/dsl-reference.md "v1 known limitations".
sanitizers: []

# Where tainted data becomes dangerous: the URL argument of an outbound request.
sinks:
  - { kind: call, pattern: "requests.get", args: [0] }
  - { kind: call, pattern: "requests.post", args: [0] }
  - { kind: call, pattern: "requests.request", args: [1] }
  - { kind: call, pattern: "urllib.request.urlopen", args: [0] }

propagators:
  - { kind: call, pattern: "str.format", flow: { from: any-arg, to: return } }
